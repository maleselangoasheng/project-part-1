<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
</head>
<body>
    <!--header section-->
    <header>
        <h1>Contact Us</h1>
    </header>

    <!--contact content-->
    <form action="mailto:your-email@example.com" method="POST" enctype="text/plain">
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" required>
        
        <label for="email">Email:</label> 
        <input type="email" id="email" name="email" required>

        <label for="number">Phone Number:</label>
        <input type="tel" id="number" name="number" placeholder="0** *** ****" required>
        <input type="tel" id="number" name="number" required>

        <label for="payment">Payment Method:</label>
        <select id="payment" name="payment" required>
            
            <option value="credit-card">mobile payment</option>
            <option value="debit-card">master Card</option>
            <option value="cash">Cash</option>
        </select>

        <label for="message">Message:</label>
        <textarea id="message" name="message" rows="5" required>Enter your message here...</textarea>
    </form>
</body>
</html>
